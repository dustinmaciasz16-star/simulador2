<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Créditos</title>
</head>
<body>

<header>
  <h1>Sistema Básico de Créditos</h1>
   <link rel="stylesheet" href="simulador_completo.css">
</header>

<nav>
  <button onclick="mostrarSeccion('parametros');">Parámetros</button>
  <button onclick="mostrarSeccion('clientes');">Clientes</button>
  <button onclick="mostrarSeccion('creditos');">Créditos</button>
  <button onclick="mostrarSeccion('historial')">Créditos Registrados</button>
  <button onclick="mostrarSeccion('contacto')">Contacto</button>
</nav>

<section id="parametros">
  <h2>Configurar Parámetros</h2>

  <label>Tasa de interés:</label>
  <input type="number" id="tasaInteres" min="10" max="20" value="15">
  <span>%</span>

  <br>
  <button onclick="guardarTasa();">Guardar tasa</button>

  <p id="mensajeTasa"></p>
</section>

<section id="clientes">
  <h2>Registro de Clientes</h2>

  <input id="input1" type="text" placeholder="Cedula">
  <input id="input2" type="text" placeholder="Nombre">
  <input id="input3" type="text" placeholder="Apellido">
  <input id="input4" type="text" placeholder="email">
  <input id="input5" type="number" placeholder="Ingresos">
  <input id="input6" type="number" placeholder="Egresos">

  <br>

  <button id="btnG" onclick="guardarCliente();">Guardar cliente</button>
  <button id="btn1">Limpiar</button>

  <table>
    <thead>
      <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Email</th>
        <th>Ingresos</th>
        <th>Egresos</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaClientes">
       
    </tbody>
  </table>
</section>

<section id="creditos">
  <h2>Simulacion de Credito</h2>

  <input type="text" id="cedulaCredito" placeholder="Ingrese la cedula">
  <button onclick="buscarClienteCredito();">Buscra Clinete</button>

  <div id="clienteCredito"></div>
  <br>

  <hr>

  <br>

  <input type="number" id="montoCredito" placeholder="Monto del crédito">
  <input type="number" id="plazoCredito" placeholder="Plazo (meses)">
  
  <button onclick="calcularCredito()">Calcular Crédito</button>

  <div id="resultadoCredito"></div>

  <button id="asignar" onclick="asignarCredito();" disabled>Asignar Crédito</button>
</section>

<section id="historial">

  <h2>Historial de Créditos</h2>

  <input type="text" id="cedulaBusqueda" placeholder="Buscar por cédula">

  <button onclick="buscarCreditosCliente()">
    Buscar Créditos
  </button>

  <button onclick="pintarCreditos(creditos)">
    Mostrar Todos
  </button>

  <table>

    <thead>
      <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Monto</th>
        <th>Tasa</th>
        <th>Plazo</th>
        <th>Cuota</th>
      </tr>
    </thead>

    <tbody id="tablaCreditos">

    </tbody>

  </table>

</section>

<section id="contacto">
  <h2>Desarrollado por Dustin Macias</h2>
</section>



<script src="simulador_completo.js"></script>
<script src="simulador_funciones.js"></script>
<script src="utilitarios.js"></script>
</body>
</html>
